name: aiyardimci
description: "AI Face Assistant - Animated AI face with voice interaction"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_tts: ^4.2.0
  shared_preferences: ^2.3.4
  http: ^1.2.2
  audioplayers: ^6.1.0
  flutter_sound: ^9.28.0
  path_provider: ^2.1.5
  record: ^6.2.0
  permission_handler: ^12.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#030608"
  adaptive_icon_foreground: "assets/icon/icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
